<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Oprettelse</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav>
  <strong>Ønskeliste</strong>
  <ul>
    <li><a th:href="@{/wish}">Hjem</a></li>
    <li><a th:href="@{/wish/login}">Login</a></li>
    <li><a th:href="@{/wish/opret}">Opret bruger</a></li>
  </ul>
</nav>

<div class="page-intro auth-intro">
  <p class="intro-badge">Kom i gang</p>
  <h1>Opret bruger</h1>
  <p>Opret din profil og få adgang til at lave og se dine ønskelister.</p>
</div>

<form class="page-form" method="post" th:action="@{/wish/opret}">
  <div class="field">
    <label class="label">Fulde navn</label>
    <input class="input" type="text" name="name" placeholder="Indtast dit navn her" required>
  </div>

  <div class="field">
    <label class="label">Email</label>
    <input class="input" type="email" name="email" placeholder="Indtast din email her" required>
  </div>

  <div class="field">
    <label class="label">Password</label>
    <input class="input" type="password" name="password" placeholder="Indtast dit password her" required>
  </div>

  <input type="submit" value="Opret bruger">
</form>

</body>
</html>
