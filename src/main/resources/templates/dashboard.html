<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" th:href="@{/dashboard.css}">
</head>
<body>

<nav>
    <strong>Ønskeliste</strong>
    <ul>
        <li><a th:href="@{/wish}">Hjem</a></li>
        <li><a th:href="@{/wish/logout}">Log ud</a></li>
    </ul>
</nav>
<div class="dashboard-page">

    <div class="dashboard-header">
        <h1>Velkommen, <span th:text="${user.name}">Bruger</span></h1>
        <p>Her kan du se og oprette dine ønskelister</p>
    </div>

    <section class="dashboard-section">
        <h2>Dine ønskelister</h2>

        <div class="dashboard-wishlist-container">
            <a class="dashboard-wishlist-card"
               th:each="wishlist : ${wishLists}"
               th:href="@{/wish/wishlist/{id}(id=${wishlist.wishListId})}">
                <h3 th:text="${wishlist.name}">Wishlist navn</h3>
                <p>Klik for at åbne ønskelisten</p>
            </a>
        </div>
    </section>

    <section class="dashboard-section">
        <h2>Opret en ny ønskeliste</h2>

        <form class="dashboard-form"
              th:action="@{/wish/dashboard/create-wishlist}"
              method="post">
            <input type="text" name="name" placeholder="Navn på ønskeliste" required>
            <button type="submit">Opret</button>
        </form>
    </section>

</div>

</body>
</html>
