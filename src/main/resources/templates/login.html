<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav>
    <strong>Wishly</strong>
    <ul>
        <li><a th:href="@{/wish}">Hjem</a></li>
        <li><a th:href="@{/wish/login}">Login</a></li>
        <li><a th:href="@{/wish/opret}">Opret bruger</a></li>
    </ul>
</nav>

<div class="page-intro auth-intro">
    <p class="intro-badge">Velkommen tilbage</p>
    <h1>Login</h1>
    <p>Log ind på din profil og få adgang til dine ønskelister.</p>
</div>

<div th:if="${error}" class="error-message">
    <p th:text="${error}"></p>
</div>

<form class="page-form" method="post" th:action="@{/wish/login}">
    <div class="field">
        <label class="label">Email</label>
        <input class="input" type="email" name="email" placeholder="Indtast din email her" required>
    </div>

    <div class="field">
        <label class="label">Password</label>
        <input class="input" type="password" name="password" placeholder="Indtast dit password her" required>
    </div>

    <input type="submit" value="Login">
</form>

</body>
</html>
