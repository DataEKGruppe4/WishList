  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: ./artifact

      - name: Check downloaded files
        run: ls -R ./artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_13869C5792254482B209B7B940329614 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6CA9BAF48EDB49B5AE2483F73626A396 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5E6286F94FB94C4781F52DACF9DC08B5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: wishlistapp
          slot-name: Production
          package: ./artifact/*.jar
